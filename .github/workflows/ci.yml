name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones previas del mismo ref para ahorrar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests unitarios
        run: pnpm test

      - name: Build
        run: pnpm build
